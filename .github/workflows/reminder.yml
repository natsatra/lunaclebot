name: Daily Reminder

on:
  schedule:
    - cron: '0 2 * * *' # 7:30 am IST
  workflow_dispatch:

jobs:
  sync-and-remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-telegram-bot pytz

      - name: Sync Google Sheet to reminders.json
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python sync_sheet.py

      - name: Commit updated reminders.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reminders.json
          git diff --staged --quiet || git commit -m "sync: update reminders.json from Google Sheet"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run reminder script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python reminder.py
